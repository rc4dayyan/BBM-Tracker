<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}BBM Tracker{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #f8f9fa;
        }
        .navbar-brand {
            font-weight: 700;
            font-size: 1.4rem;
        }
        .fuel-badge-pertalite  { background-color: #198754; }
        .fuel-badge-pertamax   { background-color: #0d6efd; }
        .fuel-badge-turbo      { background-color: #dc3545; }
        .card { border: none; box-shadow: 0 2px 8px rgba(0,0,0,.07); }
        .stat-card { border-left: 4px solid; }
        .stat-card-green  { border-color: #198754; }
        .stat-card-blue   { border-color: #0d6efd; }
        .stat-card-orange { border-color: #fd7e14; }
    </style>
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
    <div class="container">
        <a class="navbar-brand" href="{{ url_for('index') }}">
            <i class="bi bi-fuel-pump-fill me-2"></i>BBM Tracker
        </a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item">
                    <a class="nav-link {% if request.endpoint == 'index' %}active{% endif %}" href="{{ url_for('index') }}">
                        <i class="bi bi-list-ul me-1"></i>History
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link {% if request.endpoint == 'mileage' %}active{% endif %}" href="{{ url_for('mileage') }}">
                        <i class="bi bi-speedometer2 me-1"></i>Mileage
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link {% if request.endpoint == 'stats' %}active{% endif %}" href="{{ url_for('stats') }}">
                        <i class="bi bi-bar-chart-fill me-1"></i>Statistics
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link btn btn-success text-white ms-2 px-3 {% if request.endpoint == 'add' %}active{% endif %}" href="{{ url_for('add') }}">
                        <i class="bi bi-plus-circle me-1"></i>Add Entry
                    </a>
                </li>
            </ul>
        </div>
    </div>
</nav>

<div class="container pb-5">
    {% with messages = get_flashed_messages(with_categories=true) %}
        {% for category, message in messages %}
            <div class="alert alert-{{ category }} alert-dismissible fade show" role="alert">
                {{ message }}
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>
        {% endfor %}
    {% endwith %}

    {% block content %}{% endblock %}
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
{% block scripts %}{% endblock %}
</body>
</html>
